<!DOCTYPE html>
<!--Declara el tipo de documento. Indica al navegador que usará HTML5-->
<html lang="es"><!--Elemento principal del documento HTML. lang="es" indica que el contenido está en español-->

<head> <!--Sección de configuración de documento-->
    <meta charset="UTF-8">
    <!--Define la codificación de caracteres. UTF-8 permite usar correctamente las tildes, ñ, símbolos, etc-->
    <meta name="viewport" content="width=device-width", initial-scale="1.0">
    <!--Hace que el citio sea responsive. Permite que el diseño se adapte a celulares y tablets-->
    <title>Practicando HTML - img y video</title>
    <!--Título que aparece en el navegador-->
    <meta name="author" content="Matias Santelices">
    <!--Indica quien creó el sitio web-->

    <link rel="stylesheet" href="static/css/style.css">
    <!--Conexión con hoja  CSS de estilos-->
</head>

<body>
    <header> <!--Encabezado del documento-->
    <h1>Sitio multimedia personl</h1>
    </header>
    <hr> <!--Crea una linea de  división-->
    <main> <!--Sección principal del documento-->
        <h2>Mis datos:</h2>
            <p>Nombre: Matias Santelices<br> <!--br es un salto de linea-->
                Curso: 3°C
            </p>
            <hr>
            <h2>Galería multimedia</h2>
            <p>Imagen de ejemplo</p>
            <img src="static/images/imagen1.png" alt="primera imagen" width="300">
            <img src="static/images/imagen2.png" alt="segunda imagen" width="300">
            <img src="static/images/imagen3.png" alt="tercera imagen" width="300">
            <hr>
            <h2>videos</h2>
            <video width="400" controls>
                <source src="static/videos/LA CRONOLOGIA DEFINITIVA DE FIVE NIGHTS AT FREDDY´S - Jota. (1080p, h264).mp4" type="video/mp4">
            </video>
            <video width="400" controls>
                <source src="static/videos/Gato Bros (Syobon Action) en español por fernanfloo - Fernanfloo (720p, h264).mp4" type="video/mp4">
            </video>
        </main>
        <footer>
            <p style="text-align:center">Todos los derechos reservados</p>
            -<a href="https://freddy-fazbears-pizza.fandom.com/wiki/Timeline_(Core_Series)">Más información</a> <!--etiqueta <a> para vinculos-->
        </footer>
    </body>

</html>
